<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login Admin</title>
  <link rel="stylesheet" href="./assets/login_admin.css?v=2">
  <link rel="icon" type="image/png" href="https://i.ibb.co/ZpxPhvnf/imagem.png">
</head>
<body>
  <div class="container">
    <header class="login-header">
      <button id="theme-toggle" type="button" class="pill" aria-label="Alternar tema">
        <svg class="sun-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z"/></svg>
        <svg class="moon-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <button type="button" class="pill" id="btnLogout">Sair</button>
    </header>

    <div class="login-wrap">
      <div class="login-card">
        <img id="site-logo" src="https://i.ibb.co/zWJstk81/logo-nicopel-8.png" alt="Nicopel Logo" class="login-logo">
        
        <h2>Login administrativo</h2>
        <p>Entre com seu usuário e senha para acessar o painel de vagas.</p>

        <div id="loginError" class="login-error"></div>

        <form id="loginForm">
          <div class="field">
            <label for="usuario">Usuário</label>
            <input id="usuario" type="text" autocomplete="username" required>
          </div>

          <div class="field">
            <label for="senha">Senha</label>
            <input id="senha" type="password" autocomplete="current-password" required>
          </div>

          <button id="loginBtn" type="submit">Entrar</button>
        </form>

        <div class="login-footer">
          Acesso restrito ao time administrativo.
        </div>
      </div>
    </div>
  </div>

  <script src="./assets/login_admin.js?v=2"></script>
  <script>
    const toggle = document.getElementById("theme-toggle");
    const body = document.body;
    const logo = document.getElementById("site-logo");
    const logoLight = "https://i.ibb.co/zWJstk81/logo-nicopel-8.png";
    const logoDark = "https://i.ibb.co/nLkLD0f/GRUPO-NICOPEL-1.png";

    function updateTheme(theme) {
      const isDark = theme === "dark";
      body.classList.toggle("dark", isDark);
      if (logo) logo.src = isDark ? logoDark : logoLight;
      localStorage.setItem("theme", theme);
    }
    updateTheme(localStorage.getItem("theme") || "light");
    toggle.addEventListener("click", () => {
      updateTheme(body.classList.contains("dark") ? "light" : "dark");
    });
  </script>
</body>
</html>
