<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login Admin</title>
  <link rel="stylesheet" href="./assets/login_admin.css">
  <link rel="stylesheet" href="./assets/admin.css">


  <style>
    .login-wrap {
      max-width: 420px;
      margin: 90px auto;
    }

    .login-card {
      padding: 36px;
      border-radius: var(--radius);
      border: var(--border);
      box-shadow: var(--shadow);
      background: var(--card);
    }

    .login-logo {
      display: block;
      max-width: 180px;
      margin: 0 auto 24px auto;
      transition: opacity 0.3s ease;
    }

    .login-card h2 {
      margin-top: 0;
      margin-bottom: 6px;
    }

    .login-card p {
      color: var(--muted);
      font-size: 14px;
    }

    .login-card form {
      display: grid;
      gap: 16px;
      margin-top: 22px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 13px;
      color: var(--muted);
    }

    .login-card input {
      width: 100%;
      padding: 16px 18px;
      font-size: 16px;
      border-radius: 16px;
      border: var(--border);
      background: var(--card2);
      color: var(--text);
      outline: none;
      transition: 0.2s;
    }

    .login-card input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(184, 233, 0, 0.15);
    }

    .login-card button {
      margin-top: 8px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      color: #000;
      transition: 0.2s;
    }

    .login-card button:hover {
      transform: translateY(-2px);
    }

    .login-error {
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 77, 77, 0.12);
      border: 1px solid rgba(255, 77, 77, 0.25);
      color: #ff4d4d;
      font-size: 14px;
    }

    .login-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .login-wrap {
        margin: 40px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div style="display:flex; justify-content:flex-end; margin-top:20px;">
      <button id="theme-toggle" type="button" class="pill" style="cursor:pointer;">🌙</button>
      <button type="button" class="pill" id="btnLogout" style="position: relative; z-index: 999; cursor: pointer;">
          Sair
        </button>
    </div>

    <div class="login-wrap">
      <div class="login-card">
        <img id="site-logo" src="https://i.ibb.co/zWJstk81/logo-nicopel-8.png" alt="Nicopel Logo" class="login-logo">
        
        <h2>Login administrativo</h2>
        <p>Entre com seu usuário e senha para acessar o painel de vagas.</p>

        <div id="loginError" class="login-error"></div>

        <form id="loginForm">
          <div class="field">
            <label for="usuario">Usuário</label>
            <input id="usuario" type="text" autocomplete="username" required>
          </div>

          <div class="field">
            <label for="senha">Senha</label>
            <input id="senha" type="password" autocomplete="current-password" required>
          </div>

          <button id="loginBtn" type="submit">Entrar</button>
        </form>

        <div class="login-footer">
          Acesso restrito ao time administrativo.
        </div>
      </div>
    </div>
  </div>

  <script src="./assets/login_admin.js"></script>

  <script>
    const toggle = document.getElementById("theme-toggle");
    const body = document.body;
    const logo = document.getElementById("site-logo");
    const logoLight = "https://i.ibb.co/zWJstk81/logo-nicopel-8.png";
    const logoDark = "https://i.ibb.co/nLkLD0f/GRUPO-NICOPEL-1.png";

    function updateTheme(theme) {
      const isDark = theme === "dark";
      body.classList.toggle("dark", isDark);
      toggle.textContent = isDark ? "☀️" : "🌙";
      if (logo) {
        logo.src = isDark ? logoDark : logoLight;
      }
      localStorage.setItem("theme", theme);
    }

    updateTheme(localStorage.getItem("theme") || "light");

    toggle.addEventListener("click", () => {
      updateTheme(body.classList.contains("dark") ? "light" : "dark");
    });
  </script>
</body>

</html>
